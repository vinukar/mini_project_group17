<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaCare - Medical Reports</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <i class="fa-solid fa-heart-pulse"></i>
                <span>VitaCare</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="report.html">Request Report</a></li>
            </ul>
        </div>
    </nav>

    <header id="home" class="hero">
        <div class="container hero-container">
            <div class="hero-content">
                <h1>Your Health, Our Priority</h1>
                <p>Request and access your medical reports securely from participating government hospitals.</p>
                <a href="report.html" class="btn btn-primary">Request Now <i class="fa-solid fa-arrow-right"></i></a>
            </div>
            <div class="hero-image">
                <!-- Medical Animation Container -->
                <div class="medical-animation">
                    <div class="medical-circle outer"></div>
                    <div class="medical-circle inner"></div>
                    <div class="medical-icon heartbeat"><i class="fa-solid fa-heart-pulse"></i></div>
                    
                    <!-- Floating Elements -->
                    <div class="floating-item item-1"><i class="fa-solid fa-pills"></i></div>
                    <div class="floating-item item-2"><i class="fa-solid fa-dna"></i></div>
                    <div class="floating-item item-3"><i class="fa-solid fa-microscope"></i></div>
                    <div class="floating-item item-4"><i class="fa-solid fa-notes-medical"></i></div>
                    <div class="floating-item item-5"><i class="fa-solid fa-vial"></i></div>
                </div>
            </div>
        </div>
    </header>

    <footer>
        <div class="container footer-container">
            <div class="logo">
                <i class="fa-solid fa-heart-pulse"></i>
                <span>VitaCare</span>
            </div>
            <p>&copy; 2026 VitaCare Medical. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
