<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation Log - VitaCare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .log-section {
            padding: 120px 0 5rem 0;
            min-height: 90vh;
        }
        .log-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .history-card {
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 2rem;
            transition: var(--transition);
        }
        .history-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-xl);
        }
        .history-main h3 {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        .history-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .detail-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .detail-item i {
            color: var(--secondary);
            width: 16px;
        }
        .detail-item strong {
            color: var(--text-main);
        }
        .history-badge {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1rem;
        }
        .token-badge {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            font-weight: 700;
            letter-spacing: 1px;
        }
        .price-badge {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--success);
        }
        .empty-log {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }
        .empty-log i {
            font-size: 4rem;
            color: var(--border);
            margin-bottom: 1rem;
        }
        @media (max-width: 768px) {
            .history-card {
                grid-template-columns: 1fr;
            }
            .history-badge {
                align-items: flex-start;
                border-top: 1px solid var(--border);
                padding-top: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-heart-pulse"></i>
                <span>VitaCare</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="report.html">Request Report</a></li>
                <li><a href="log.html" class="active">Reservation Log</a></li>
                <li>
                    <button id="theme-toggle" class="btn" aria-label="Toggle Theme">
                        <i class="fa-solid fa-sun"></i>
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <section class="log-section">
        <div class="container log-container">
            <div class="section-title">
                <h2>Reservation History</h2>
                <p>Track all your previous medical report requests and payments.</p>
            </div>

            <div id="history-list" class="history-list">
                <!-- Populated by log.js -->
                <div class="empty-log">
                    <i class="fa-solid fa-folder-open"></i>
                    <h3>No Reservations Found</h3>
                    <p>You haven't made any report requests yet.</p>
                    <a href="report.html" class="btn btn-primary" style="margin-top: 1.5rem;">Request Now</a>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container footer-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-heart-pulse"></i>
                <span>VitaCare</span>
            </a>
            <p>&copy; 2026 VitaCare Medical. All rights reserved. | <strong>Project by Group-17</strong></p>
        </div>
    </footer>

    <script src="theme.js"></script>
    <script src="log.js"></script>
</body>
</html>
